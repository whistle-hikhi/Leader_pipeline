model_name: LEADER

hidden_size: 64
num_trm_layers: 1
num_attention_heads: 4
intermediate_size: 64
hidden_dropout_prob: 0.4
attention_probs_dropout_prob: 0.1

# Profile encoder: use patient demographics as soft prompts
profile: false
prompt_num: 1

# Knowledge distillation from LLM teacher
distill: false
d_loss: mse
alpha: 0.1
temperature: 5.0
llm_path: ""       # path to base LLaMA weights
peft_path: ""      # path to LoRA checkpoint from scripts/finetune_llm.py
max_source_length: 1024
offline: false     # true = load pre-computed hidden_states from JSONL (no teacher GPU needed)

# Profile-medication alignment loss
align: false
align_weight: 0.1

# Multi-label margin loss
ml_weight: 0.05

# DDI-penalised training
ddi: false
target_ddi: 0.06
ddi_temp: 2.0
